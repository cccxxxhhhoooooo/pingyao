    <style>
        .font-calligraphy {
        font-family: 'Ma Shan Zheng', cursive !important;
        font-weight: 400;
        letter-spacing: 0.15em;
    }
            :root {
            --brick-red: #8B3A3A;
            --dark-brick: #6B2828;
            --grey-blue: #4A5568;
            --dark-wood: #5C3A1E;
            --wood: #8B5A2B;
            --light-wood: #A67C52;
            --parchment: #F5F0E8;
            --cream: #E8DFD3;
            --gold: #D4AF37;
            --light-gold: #F4E3A8;
        }
        
        .font-serif-sc { 
            font-family: 'Noto Serif SC', serif; 
            font-weight: 300;
        }
        
        /* 导航栏专用动画 */
        @keyframes navSlideIn {
            from { 
                transform: translateY(-100%); 
                opacity: 0; 
            }
            to { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }
        
        .nav-slide-in {
            animation: navSlideIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        
        /* 徽标悬浮效果 */
        @keyframes logoGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
            }
            50% { 
                filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
            }
        }
        
        .logo-glow {
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        /* 导航链接特效 */
        .nav-link-enhanced {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .nav-link-enhanced::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(212, 175, 55, 0.1), 
                transparent);
            transition: left 0.6s ease;
        }
        
        .nav-link-enhanced:hover::before {
            left: 100%;
        }
        
        .nav-link-enhanced::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                var(--gold), 
                var(--light-gold), 
                var(--gold));
            transition: width 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 1px;
        }
        
        .nav-link-enhanced:hover::after {
            width: 100%;
        }
        
        /* 导航栏阴影和背景 */
        .nav-elegant {
            background: linear-gradient(
                135deg,
                rgba(214, 128, 90, 0.95) 0%,
                rgba(160, 101, 52, 0.92) 50%,
                rgba(185, 118, 55, 0.89) 100%
            );
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(212, 175, 55, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* 徽标边框效果 */
        .logo-border {
            position: relative;
            border: 2px solid transparent;
            background: linear-gradient(45deg, var(--dark-wood), var(--gold), var(--dark-wood)) border-box;
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
        }
        
      
        .book-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.6s ease;
        }
        
        .book-btn:hover::before {
            left: 100%;
        }
        
        .book-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 
                0 10px 25px rgba(139, 58, 58, 0.4),
                0 0 20px rgba(212, 175, 55, 0.3);
        }
        
        /* 下拉菜单效果 */
        .nav-dropdown {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .nav-dropdown-parent:hover .nav-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            position: relative;
            width: 30px;
            height: 30px;
        }
        
        .mobile-menu-btn span {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--gold);
            transition: all 0.3s ease;
        }
        
        .mobile-menu-btn span:nth-child(1) { top: 6px; }
        .mobile-menu-btn span:nth-child(2) { top: 14px; }
        .mobile-menu-btn span:nth-child(3) { top: 22px; }
        
        .mobile-menu-btn.active span:nth-child(1) {
            transform: rotate(45deg);
            top: 14px;
        }
        
        .mobile-menu-btn.active span:nth-child(2) {
            opacity: 0;
        }
        
        .mobile-menu-btn.active span:nth-child(3) {
            transform: rotate(-45deg);
            top: 14px;
        }
        
       
        
        /* 标题卷轴展开动画 */
        @keyframes scrollUnroll {
            0% { 
                transform: scaleX(0) translateY(20px); 
                opacity: 0; 
            }
            20% { 
                opacity: 0.3; 
            }
            100% { 
                transform: scaleX(1) translateY(0); 
                opacity: 1; 
            }
        }
        
        .scroll-reveal { 
            animation: scrollUnroll 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; 
            transform-origin: left center; 
        }
        
        /* 文字逐字出现效果 */
        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
        
        /* 毛笔字签名效果 */
        .signature-text {
            background: linear-gradient(to right, var(--brick-red), var(--dark-wood));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 边框装饰 */
        .border-decorative {
            position: relative;
        }
        
        .border-decorative::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }
        
        .border-decorative::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--parchment);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--wood), var(--dark-wood));
            border-radius: 4px;
        }
        
        /* 纹理叠加 */
        .texture-overlay {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%235c3a1e' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.5;
        }
        
       /* 毛笔字标题效果 */
        .brush-title {
            position: relative;
            display: inline-block;
            font-family: "Noto Serif SC", serif;
            font-weight: 900; 
            letter-spacing: 0.1em; 
            text-shadow: 
                0 4px 12px rgba(0,0,0,0.4),

        }

        .brush-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--brick-red) 20%,

                var(--brick-red) 80%, 
                transparent 100%);
            border-radius: 3px;
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 背景图加载过渡 */
        .bg-fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>

        function toggleDropdown() {
    const menu = document.getElementById("dropdownMenu");

    if (menu.classList.contains("hidden")) {
        menu.classList.remove("hidden");
    } else {
        menu.classList.add("hidden");
    }
}
        // 移动端菜单切换
        function toggleMobileMenu() {
            const menuBtn = document.querySelector('.mobile-menu-btn');
            const mobileMenu = document.getElementById('mobileMenu');
            
            menuBtn.classList.toggle('active');
            
            if (mobileMenu.classList.contains('opacity-0')) {
                mobileMenu.classList.remove('opacity-0', '-translate-y-full');
                mobileMenu.classList.add('opacity-100', 'translate-y-0');
            } else {
                mobileMenu.classList.remove('opacity-100', 'translate-y-0');
                mobileMenu.classList.add('opacity-0', '-translate-y-full');
            }
        }
        
        // 背景图加载完成后的效果
        document.addEventListener('DOMContentLoaded', function() {
            const bgImage = document.getElementById('main-bg');
            if (bgImage.complete) {
                bgImage.style.opacity = '1';
            }
            
            // 导航栏滚动效果
            let lastScroll = 0;
            const navbar = document.querySelector('nav');
            
            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset;
                
                if (currentScroll <= 0) {
                    navbar.style.transform = 'translateY(0)';
                }
                
                if (currentScroll > lastScroll && currentScroll > 100) {
                    // 向下滚动
                    navbar.style.transform = 'translateY(-100%)';
                } else if (currentScroll < lastScroll) {
                    // 向上滚动
                    navbar.style.transform = 'translateY(0)';
                }
                
                lastScroll = currentScroll;
            });
            
            // 鼠标移动到灯笼上的效果
            const lanterns = document.querySelectorAll('.lantern-sway > div:first-child');
            lanterns.forEach(lantern => {
                lantern.addEventListener('mouseenter', function() {
                    this.style.filter = 'brightness(1.2) drop-shadow(0 0 10px rgba(212, 175, 55, 0.7))';
                });
                
                lantern.addEventListener('mouseleave', function() {
                    this.style.filter = '';
                });
            });
            
            // 导航链接点击效果
            const navLinks = document.querySelectorAll('.nav-link-enhanced');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    
                    // 添加点击动画
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = '';
                    }, 150);
                    
                    // 关闭移动端菜单
                    const mobileMenu = document.getElementById('mobileMenu');
                    const menuBtn = document.querySelector('.mobile-menu-btn');
                    
                    if (!mobileMenu.classList.contains('opacity-0')) {
                        menuBtn.classList.remove('active');
                        mobileMenu.classList.remove('opacity-100', 'translate-y-0');
                        mobileMenu.classList.add('opacity-0', '-translate-y-full');
                    }
                });
            });
            
        });
    </script>
</body>
</html>
